<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Foia</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("thumb.jpg");
    background-size:cover;
    background-position:center;
}

.card{
    width:90%;
    max-width:500px;
    text-align:center;
    backdrop-filter:blur(8px);
    background:rgba(0,0,0,.45);
    border:2px solid #55ff55;
    border-radius:20px;
    padding:30px;
}

h1{
    color:#55ff55;
    font-size:clamp(2rem,6vw,4rem);
    margin-bottom:10px;
}

p{
    color:white;
    margin-bottom:25px;
}

.botao{
    display:inline-block;
    text-decoration:none;
    background:#55ff55;
    color:black;
    font-weight:bold;
    padding:16px 30px;
    border-radius:12px;
    transition:.3s;
}

.botao:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #55ff55;
}

@media (max-width:600px){
    .card{
        padding:20px;
    }
}
</style>
</head>
<body>

<div class="card">
    <h1>MC FOIA</h1>
    <p>Ouça as músicas e acompanhe os lançamentos.</p>

    <a class="botao"
       href="https://www.youtube.com/channel/UClaMpjuRhOyudoQTxK3g3ig"
       target="_blank">
       YOUTUBE OFICIAL
    </a>
</div>

</body>
</html>
